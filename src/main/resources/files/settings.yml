# Capture The Wool Module Settings

file_version: 1

# Visual representation in menus
menus:
  vote:
    item: WHITE_WOOL

teams:
  # Minimum amount of teams required to start the match
  min_count: 2
  # Minimum players per team required to start
  min_size: 2

game:
  # Set to 0 to disable a time limit
  time_limit_seconds: 0
  # Seconds a player must wait before respawning
  respawn_delay_seconds: 3

spawn_protection:
  # Seconds of fall-damage immunity after spawning
  fall_damage_seconds: 5

combat:
  kill_regeneration:
    # Health restored when eliminating an enemy (set to 0 to disable)
    health: 6.0

block_rules:
  # When true, players can only break blocks placed by players during the match
  break_only_player_placed: true

wools:
  # Material used when a wool location does not define its own block
  default_material: WHITE_WOOL
  # Update interval (ticks) for the carried wool hologram
  carrier_hologram_update_ticks: 2

# Game items (optional)
items:
  # Items to give all players on game start
  # Format: MATERIAL:AMOUNT:SLOT
  starting_items: []

  # Team-specific starting items keyed by team id
  # Format: MATERIAL:AMOUNT:SLOT[:HEX_COLOR]
  # HEX_COLOR is used by leather armor pieces
  starting_items_by_team:
    "1":
      - "STONE_SWORD:1:0"
      - "BOW:1:1"
      - "STONE_PICKAXE:1:2"
      - "STONE_AXE:1:3"
      - "OAK_PLANKS:64:4"
      - "OAK_PLANKS:64:5"
      - "OAK_PLANKS:64:6"
      - "GOLDEN_APPLE:1:7"
      - "ARROW:8:8"
      - "LEATHER_BOOTS:1:36:#FF0000"
      - "LEATHER_LEGGINGS:1:37:#FF0000"
      - "LEATHER_CHESTPLATE:1:38:#FF0000"
      - "LEATHER_HELMET:1:39:#FF0000"

    "2":
      - "STONE_SWORD:1:0"
      - "BOW:1:1"
      - "STONE_PICKAXE:1:2"
      - "STONE_AXE:1:3"
      - "OAK_PLANKS:64:4"
      - "OAK_PLANKS:64:5"
      - "OAK_PLANKS:64:6"
      - "GOLDEN_APPLE:1:7"
      - "ARROW:8:8"
      - "LEATHER_BOOTS:1:36:#0000FF"
      - "LEATHER_LEGGINGS:1:37:#0000FF"
      - "LEATHER_CHESTPLATE:1:38:#0000FF"
      - "LEATHER_HELMET:1:39:#0000FF"

effects:
  # Effects to give players during the game
  # Format: EFFECT_TYPE:DURATION_TICKS:AMPLIFIER
  starting_effects: []

  # Effects when player respawns
  # Format: EFFECT_TYPE:DURATION_TICKS:AMPLIFIER
  respawn_effects:
    - "DAMAGE_RESISTANCE:60:1"
