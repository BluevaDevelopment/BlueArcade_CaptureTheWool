setup_messages:
  common:
    boolean_true: "Yes"
    boolean_false: "No"
  team:
    usage: "<red>Usage:</red> <yellow>/baa game <id> capture_the_wool team <count|size> <value></yellow>"
    success: "<green>Team {setting} set to {value} for {game} in arena {arena_id}.</green>"
    invalid_limit: "<red>Team configuration exceeds arena max players ({max_players}).</red>"
    invalid_value: "<red>Team {setting} must be greater than 0.</red>"
    invalid_count: "<red>Team count must be at least 2.</red>"
    invalid_size: "<red>Team size must be at least 2.</red>"
    numeric_ids_only: "<red>team_id must be numeric and within configured range: <white>{min}</white> to <white>{max}</white>.</red>"
  search_chests:
    missing_bounds: "<red>Game bounds are not configured yet.</red>"
    start: "<yellow>Searching for chests... ({blocks} blocks to scan)</yellow>"
    action_bar: "<gold>Searching chests</gold> <gray>(Time elapsed: {time})</gray> <dark_gray>•</dark_gray> <green>{found}</green>"
    complete: "<green>Chest search completed.</green> <yellow>Found {found} chests in {time}.</yellow>"
  region:
    usage: "<red>Usage:</red> <yellow>/baa game <id> capture_the_wool region <set|clear></yellow>"
    must_use_stick: "<red>Select two corners with the setup tool first.</red>"
    set: "<green>Regeneration region saved.</green> <gray>Blocks:</gray> <white>{blocks}</white> <gray>({x}x{y}x{z})</gray>"
    cleared: "<yellow>Regeneration region cleared.</yellow>"

  wool:
    usage: "<red>Usage:</red> <yellow>/baa game <id> capture_the_wool wool <create|capture|clearcapture|list> ...</yellow>"
    create_usage: "<red>Usage:</red> <yellow>/baa game <id> capture_the_wool wool create <wool_id> <MATERIAL> <owner_team></yellow>"
    capture_usage: "<red>Usage:</red> <yellow>/baa game <id> capture_the_wool wool capture <wool_id> <capture_team></yellow>"
    clear_capture_usage: "<red>Usage:</red> <yellow>/baa game <id> capture_the_wool wool clearcapture <wool_id></yellow>"
    must_use_stick: "<red>Select exactly one block with the magic stick first.</red>"
    single_block_only: "<red>Each wool objective uses exactly one block.</red>"
    created: "<green>Wool <white>{wool}</white> created. Material: <white>{material}</white>, owner team: <white>{team}</white>.</green>"
    capture_set: "<green>Capture point saved for wool <white>{wool}</white>. Owner: <white>{owner_team}</white>, stealing teams: <white>{capture_team}</white>.</green>"
    capture_cleared: "<yellow>Capture configuration cleared for wool <white>{wool}</white>.</yellow>"
    list_header: "<gold>Configured wools by team:</gold>"
    list_line: "<gray>- Team <white>{team}</white> | wool <white>{wool}</white> | steals: <white>{capture_team}</white> | material: <white>{material}</white></gray>"
    list_empty: "<yellow>No wools configured yet.</yellow>"
    not_found: "<red>Wool <white>{wool}</white> does not exist. Create it first.</red>"
    invalid_team: "<red>Invalid team id: <white>{team}</white>.</red>"
    capture_owner_forbidden: "<red>Team <white>{team}</white> owns wool <white>{wool}</white>. Owner team cannot be the capture team.</red>"
    invalid_material: "<red>Invalid material: {material}. Use a valid Bukkit material name (e.g., YELLOW_WOOL).</red>"
  team_spawn:
    usage: "<red>Usage:</red> <yellow>/baa game <id> capture_the_wool team spawn <team_id></yellow>"
    set: "<green>Team spawn set for team <white>{team}</white> at your current location.</green>"
  team_zone:
    usage: "<red>Usage:</red> <yellow>/baa game <id> capture_the_wool team zone <create|list|delete> ...</yellow>"
    create_usage: "<red>Usage:</red> <yellow>/baa game <id> capture_the_wool team zone create <team_id></yellow>"
    delete_usage: "<red>Usage:</red> <yellow>/baa game <id> capture_the_wool team zone delete <team_id> <index></yellow>"
    must_use_stick: "<red>Select two corners with the setup tool first.</red>"
    set: "<green>Restricted zone #{index} set for team <white>{team}</white>.</green>"
    deleted: "<yellow>Restricted zone #{index} deleted for team <white>{team}</white>.</yellow>"
    not_found: "<red>Restricted zone #{index} for team <white>{team}</white> does not exist.</red>"
    list_header: "<gold>Restricted zones by team:</gold>"
    list_line: "<gray>- Team <white>{team}</white> | zone <white>#{index}</white></gray>"
    list_empty: "<yellow>No restricted zones configured yet.</yellow>"
