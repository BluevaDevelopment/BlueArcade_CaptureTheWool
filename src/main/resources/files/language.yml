file_version: 1
display_name: "Capture The Wool"

description:
  - "<dark_gray><strikethrough>----------------------------------------------</strikethrough></dark_gray>"
  - "<green>Game</green> <gray>-</gray> <yellow><bold>Capture The Wool</bold></yellow>"
  - " "
  - "<white>Description:</white>"
  - "<gray>Capture enemy wools from their base and bring them back to yours.</gray>"
  - "<gray>Work with your team to capture all the wools first!</gray>"
  - " "
  - "<dark_gray><strikethrough>----------------------------------------------</strikethrough></dark_gray>"

vote_menu:
  name: "<green>Capture The Wool</green>"
  lore:
    - "<gray>Capture enemy wools and bring them to your base.</gray>"
    - "<gray>Loot, fight, and capture all wools to win!</gray>"
    - ""
    - "<white>{votes}</white> <gray>votes.</gray>"

votes:
  labels:
    categories:
      chests: "Chest loot"
      hearts: "Hearts"
      time: "Time"
      weather: "Weather"
    options:
      chests:
        basic: "Basic"
        normal: "Normal"
        overpowered: "Overpowered"
      hearts:
        "10": "10 hearts"
        "20": "20 hearts"
        "30": "30 hearts"
      time:
        day: "Day"
        night: "Night"
        sunset: "Sunset"
        sunrise: "Sunrise"
      weather:
        sunny: "Sunny"
        rainy: "Rainy"
  messages:
    broadcast: "<yellow>{player}</yellow> <gray>picked</gray> <aqua>{category}</aqua> <dark_gray>→</dark_gray> <white>{option}</white>"
    selected:
      sources:
        popular: "by popular vote"
        default: "by default"
      chests: "<gray>Selected</gray> <gold>{option}</gold> <gray>chest loot {source}.</gray>"
      hearts: "<gray>Selected</gray> <red>{option}</red> <gray>{source}.</gray>"
      time: "<gray>Selected</gray> <yellow>{option}</yellow> <gray>time {source}.</gray>"
      weather: "<gray>Selected</gray> <blue>{option}</blue> <gray>weather {source}.</gray>"
    invalid: "<red>That vote option is not available.</red>"
    not_available: "<red>You can only vote while waiting for the game to start.</red>"
    no_permission: "<red>You do not have permission to vote for</red> <yellow>{option}</yellow><red>.</red>"
stats:

  descriptions:
    wins: "CaptureTheWool victories"
    games_played: "CaptureTheWool matches played"
    kills: "Opponents eliminated in CaptureTheWool"
    chests_looted: "Chests opened in CaptureTheWool"
    deaths: "Times eliminated in CaptureTheWool"
    wools_stolen: "Enemy wools picked up in CaptureTheWool"
    wools_captured: "Objective wools captured in CaptureTheWool"
  labels:
    kills: "Eliminations"
    games_played: "Capture The Wool games played"
    wins: "Capture The Wool wins"
    chests_looted: "Chests looted"
    deaths: "Deaths"
    wools_stolen: "Wools stolen"
    wools_captured: "Wools captured"

messages:
  common:
    boolean_true: "Yes"
    boolean_false: "No"
  eliminated: "<red>You died! Respawning...</red>"
  out_of_bounds: "<yellow>You cannot leave the arena.</yellow>"
  restricted_zone: "<red>You cannot enter this area!</red>"
  winner_board:
    separator: "<dark_gray><strikethrough>----------------------------------------------</strikethrough></dark_gray>"
    title: "<white><bold>Captured Wools</bold></white>"
    team_title: "{team}<gray>'s Captures</gray>"
    missing_text: "Not captured"
    unknown_player: "Unknown"
    line_prefix: "  "
    entry_gap: "  "
    entries_per_line: 2
  action_bar:
    in_game: "<yellow>{team}</yellow> <dark_gray>•</dark_gray> <white>Wools:</white> <green>{captured}/{objectives}</green> <dark_gray>•</dark_gray> <white>K:</white> <red>{kills}</red> <white>D:</white> <gray>{deaths}</gray> <dark_gray>•</dark_gray> <white>Carrying:</white> <aqua>{carrying}</aqua>"
  deaths:
    killed_by_player:
      - "<dark_red>✘</dark_red> <red>{victim}</red> <gray>was eliminated by</gray> <yellow>{killer}</yellow><gray>.</gray>"
      - "<dark_red>✘</dark_red> <yellow>{killer}</yellow> <gray>outplayed</gray> <red>{victim}</red><gray>.</gray>"
      - "<dark_red>✘</dark_red> <red>{victim}</red> <gray>fell to</gray> <yellow>{killer}</yellow><gray>'s attack.</gray>"
      - "<dark_red>✘</dark_red> <yellow>{killer}</yellow> <gray>took down</gray> <red>{victim}</red><gray>.</gray>"
    generic:
      - "<dark_red>✘</dark_red> <red>{victim}</red> <gray>couldn't survive the chaos.</gray>"
      - "<dark_red>✘</dark_red> <red>{victim}</red> <gray>was eliminated.</gray>"
  wool:
    picked_up: "<yellow>{player}</yellow> <gray>picked up a wool from team</gray> <aqua>{team}</aqua><gray>!</gray>"
    captured: "<green><bold>WOOL CAPTURED!</bold></green> <yellow>{player}</yellow> <gray>captured a wool for team</gray> <aqua>{team}</aqua><gray>!</gray>"
    dropped: "<red>{player}</red> <gray>dropped a wool! It has returned to its spawn.</gray>"
    cannot_break_own: "<red>This wool belongs to your team. Defend it!</red>"
    cannot_break: "<red>You cannot take this wool.</red>"
    carrier_hologram: "<gold>⬛ CARRYING WOOL ⬛</gold>"
    break_hint:
      title: "<yellow><bold>BREAK THIS WOOL!</bold></yellow>"
      subtitle: "<gray>Break it to carry it to your base.</gray>"

titles:
