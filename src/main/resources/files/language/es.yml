setup_messages:
  common:
    boolean_true: "Sí"
    boolean_false: 'No'
  team:
    usage: "{prefix} <red>Uso:</red> <yellow>/baa game <id> capture_the_wool team <count|size> <value></yellow>"
    success: "{prefix} <green>Equipo {setting} establecido en {value} para {game} en la arena {arena_id}.</green>"
    invalid_limit: "{prefix} <red>La configuración de equipos supera el máximo de jugadores de la arena ({max_players}).</red>"
    invalid_value: "{prefix} <red>Equipo {setting} debe ser mayor que 0.</red>"
    invalid_count: "{prefix} <red>El número de equipos debe ser al menos 2.</red>"
    invalid_size: "{prefix} <red>El tamaño del equipo debe ser al menos 2.</red>"
    numeric_ids_only: "{prefix} <red>team_id debe ser numérico y estar dentro del rango configurado: <white>{min}</white> a <white>{max}</white>.</red>"
  search_chests:
    missing_bounds: "{prefix} <red>Los límites del juego aún no están configurados.</red>"
    start: "{prefix} <yellow>Buscando cofres... ({blocks} bloques que escanear)</yellow>"
    action_bar: "<gold>Buscando cofres</gold> <gray>(Tiempo transcurrido: {time})</gray> <dark_gray>•</dark_gray> <green>{found}</green>"
    complete: "{prefix} <green>Búsqueda de cofres completada.</green> <yellow>Encontrados {found} cofres en {time}.</yellow>"
  region:
    usage: "{prefix} <red>Uso:</red> <yellow>/baa game <id> capture_the_wool region <set|clear></yellow>"
    must_use_stick: "{prefix} <red>Selecciona primero dos esquinas con la herramienta de setup.</red>"
    set: "{prefix} <green>Región de regeneración guardada.</green> <gray>Bloques:</gray> <white>{blocks}</white> <gray>({x}x{y}x{z})</gray>"
    cleared: "{prefix} <yellow>Región de regeneración borrada.</yellow>"
  wool:
    usage: "{prefix} <red>Uso:</red> <yellow>/baa game <id> capture_the_wool wool <create|capture|clearcapture|list> ...</yellow>"
    create_usage: "{prefix} <red>Uso:</red> <yellow>/baa game <id> capture_the_wool wool create <wool_id> <MATERIAL> <owner_team></yellow>"
    capture_usage: "{prefix} <red>Uso:</red> <yellow>/baa game <id> capture_the_wool wool capture <wool_id> <capture_team></yellow>"
    clear_capture_usage: "{prefix} <red>Uso:</red> <yellow>/baa game <id> capture_the_wool wool clearcapture <wool_id></yellow>"
    must_use_stick: "{prefix} <red>Selecciona primero exactamente un bloque con la vara mágica.</red>"
    single_block_only: "{prefix} <red>Cada objetivo de lana usa exactamente un bloque.</red>"
    created: "{prefix} <green>Lana <white>{wool}</white> creada. Material: <white>{material}</white>, equipo propietario: <white>{team}</white>.</green>"
    capture_set: "{prefix} <green>Punto de captura guardado para la lana <white>{wool}</white>. Propietario: <white>{owner_team}</white>, equipos que la pueden robar: <white>{capture_team}</white>.</green>"
    capture_cleared: "{prefix} <yellow>Configuración de captura borrada para la lana <white>{wool}</white>.</yellow>"
    list_header: "{prefix} <gold>Lanas configuradas por equipo:</gold>"
    list_line: "{prefix} <gray>- Equipo <white>{team}</white> | lana <white>{wool}</white> | roba: <white>{capture_team}</white> | material: <white>{material}</white></gray>"
    list_empty: "{prefix} <yellow>Todavía no hay lanas configuradas.</yellow>"
    not_found: "{prefix} <red>La lana <white>{wool}</white> no existe. Créala primero.</red>"
    invalid_team: "{prefix} <red>ID de equipo no válido: <white>{team}</white>.</red>"
    capture_owner_forbidden: "{prefix} <red>Equipo <white>{team}</white> posee la lana <white>{wool}</white>. El equipo propietario no puede ser el equipo capturador.</red>"
    invalid_material: "{prefix} <red>Material no válido: {material}. Usa un nombre de material de Bukkit válido (por ejemplo, YELLOW_WOOL).</red>"
  team_spawn:
    usage: "{prefix} <red>Uso:</red> <yellow>/baa game <id> capture_the_wool team spawn <team_id></yellow>"
    usage_remove: "{prefix} <red>Uso:</red> <yellow>/baa game <id> capture_the_wool team spawn remove <team_id></yellow>"
    teams_not_configured: "{prefix} <red>El número de equipos aún no está configurado. Defínelo primero con <yellow>/baa game <id> capture_the_wool team count <n></yellow>.</red>"
    set: "{prefix} <green>Aparición de equipo establecida para el equipo <white>{team}</white> en tu ubicación actual.</green>"
    removed: "{prefix} <yellow>Aparición de equipo eliminada para el equipo <white>{team}</white>.</yellow>"
  team_zone:
    usage: "{prefix} <red>Uso:</red> <yellow>/baa game <id> capture_the_wool team zone <create|list|delete> ...</yellow>"
    create_usage: "{prefix} <red>Uso:</red> <yellow>/baa game <id> capture_the_wool team zone create <team_id></yellow>"
    delete_usage: "{prefix} <red>Uso:</red> <yellow>/baa game <id> capture_the_wool team zone delete <team_id> <index></yellow>"
    must_use_stick: "{prefix} <red>Selecciona primero dos esquinas con la herramienta de setup.</red>"
    set: "{prefix} <green>Zona restringida #{index} establecida para el equipo <white>{team}</white>.</green>"
    deleted: "{prefix} <yellow>Zona restringida #{index} eliminada para el equipo <white>{team}</white>.</yellow>"
    not_found: "{prefix} <red>Zona restringida #{index} del equipo <white>{team}</white> no existe.</red>"
    list_header: "{prefix} <gold>Zonas restringidas por equipo:</gold>"
    list_line: "{prefix} <gray>- Equipo <white>{team}</white> | zone <white>#{index}</white></gray>"
    list_empty: "{prefix} <yellow>No restricted zones configurado yet.</yellow>"
